<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PingME NFC Profile</title>
    <meta name="description" content="PingME NFC Business Profile" />
    <meta name="keywords" content="PingME, Ping IFF LLP, Ping, Pingiff, Pingiff.ai, plzpingme.com, NFC smart cards, NFC profile builder, contact sharing" />
    <meta name="author" content="PingME" />
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Fonts: preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="PingME" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:site_name" content="PingME" />
    <meta property="og:title" content="PingME NFC Profile" />
    <meta property="og:description" content="PingME NFC Business Profile" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://plzpingme.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PingME NFC Profile" />
    <meta name="twitter:description" content="PingME NFC Business Profile" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- JSON-LD WebSite Schema (defines Site Name for Google Search) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PingME",
        "alternateName": [
          "PingME",
          "Ping IFF LLP",
          "Ping",
          "Pingiff",
          "plzpingme.com"
        ],
        "url": "https://plzpingme.com/"
      }
    </script>

    <!-- JSON-LD Organization Schema (defines company relationship and aliases) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PingME",
        "legalName": "Ping IFF LLP",
        "alternateName": [
          "Ping IFF LLP",
          "Pingiff",
          "Ping"
        ],
        "url": "https://plzpingme.com",
        "logo": "https://plzpingme.com/logo.png",
        "sameAs": [
          "https://www.facebook.com/PingME",
          "https://twitter.com/PingME",
          "https://www.instagram.com/PingME"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/nfc-main.tsx"></script>
  </body>
</html>
